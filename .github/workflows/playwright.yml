name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      # Pin pnpm to the version in package.json's packageManager field.
      # Unpinned latest (11.x) applies stricter supply-chain policies that
      # reject entries in the current lockfile (ERR_PNPM_TRUST_DOWNGRADE).
      run: npm install -g pnpm@10.33.0 && pnpm install
    - name: Install Playwright Browsers
      run: pnpm exec playwright install --with-deps
    - name: Build project
      run: pnpm run build
    - name: Run Playwright tests
      run: pnpm run e2e
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
