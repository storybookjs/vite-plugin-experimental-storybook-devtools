name: Publish
on: [push, pull_request]

permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          # Current Corepack needs node:sqlite (Node >= 22.5) to provision
          # pnpm; on Node 20 it crashes with ERR_UNKNOWN_BUILTIN_MODULE.
          # The pnpm version itself is pinned via package.json#packageManager.
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      # - name: Typecheck
      #   run: pnpm typecheck

      - name: Build
        run: pnpm build

      - run: pnpm dlx pkg-pr-new publish